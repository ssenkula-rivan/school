services:
  - type: web
    name: school-management-system
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate --noinput
      gunicorn workplace_system.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "school-2v7o.onrender.com,*.onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://school-2v7o.onrender.com,https://*.onrender.com"
      - key: SYSADMIN_PASSWORD
        value: "Admin@123456"
      - key: DISABLE_SSL_REDIRECT
        value: "True"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: USE_REDIS
        value: "False"

databases:
  - name: school-db
    databaseName: workplace_management
    user: school_user
