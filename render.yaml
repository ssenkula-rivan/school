services:
  - type: web
    name: school-management-system
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn workplace_system.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.2
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: school-db
          property: connectionString
      - key: USE_POSTGRES
        value: True

databases:
  - name: school-db
    databaseName: school_management
    user: school_user
    plan: free
