services:
  - type: web
    name: school-management-system
    runtime: python
    pythonVersion: 3.9
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn workplace_system.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: ALLOWED_HOSTS
        fromDatabase:
          name: school_db
          property: host
      - key: SECRET_KEY
        generateValue: true
      - key: USE_POSTGRES
        value: "True"
      - key: DB_NAME
        fromDatabase:
          name: school_db
          property: database
      - key: DB_USER
        fromDatabase:
          name: school_db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: school_db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: school_db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: school_db
          property: port
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@yourdomain.com"
      - key: SITE_URL
        value: "https://yourdomain.com"
      - key: SITE_NAME
        value: "School Management System"

databases:
  - name: school_db
    databaseName: school_management
    user: postgres
    region: oregon
