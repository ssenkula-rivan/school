services:
  - type: web
    name: school-management-system
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn workplace_system.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --worker-class sync --timeout 60
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: "production"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: school_db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "school-2v7o.onrender.com,*.onrender.com"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@school.com"
      - key: USE_REDIS
        value: "False"

databases:
  - name: school_db
    databaseName: school_management_saas
    user: postgres
    region: oregon
