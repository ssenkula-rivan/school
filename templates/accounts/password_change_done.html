{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center py-5">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                    </div>
                    <h3 class="mb-3">Password Changed Successfully</h3>
                    <p class="text-muted mb-4">
                        Your password has been changed. You can now use your new password to login.
                    </p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'accounts:profile' %}" class="btn btn-primary">
                            <i class="fas fa-user me-2"></i>Go to Profile
                        </a>
                        <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-home me-2"></i>Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
